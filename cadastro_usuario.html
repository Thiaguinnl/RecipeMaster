<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário - Recipe Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg">
        <div class="container">
            <a id="nav-logo" class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="/assets/img/chili-pepper-unscreen.gif" alt="Logo">
                <span style="color:#e9a209;">RECIPE MASTER</span>
            </a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-warning">
                    <i class="fas fa-arrow-left me-1"></i>Voltar para Login
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Cadastro de Usuário</h2>
                        <div id="mensagem-cadastro" class="alert d-none" role="alert"></div>
                        <form id="form-cadastro">
                            <div class="mb-3">
                                <label for="cadastro-nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="cadastro-nome" required>
                            </div>
                            <div class="mb-3">
                                <label for="cadastro-email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="cadastro-email" required>
                            </div>
                            <div class="mb-3">
                                <label for="cadastro-senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="cadastro-senha" required>
                            </div>
                            <div class="mb-3">
                                <label for="cadastro-confirmar-senha" class="form-label">Confirmar Senha</label>
                                <input type="password" class="form-control" id="cadastro-confirmar-senha" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning">Cadastrar</button>
                            </div>
                            <p class="text-center mt-3">Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container d-flex justify-content-center align-items-center">
            <p class="mb-0 text-center">&copy; 2024 Recipe Master. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/assets/scripts/auth.js"></script> 
</body>
</html>
