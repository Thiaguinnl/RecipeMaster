<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação - Recipe Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg">
        <div class="container">
            <a id="nav-logo" class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/img/chili-pepper-unscreen.gif" alt="Logo">
                <span style="color:#e9a209;">RECIPE MASTER</span>
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-5">Análise de Receitas</h1>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Receitas por Categoria</h5>
                        <canvas id="categoriaChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Tempo de Preparo</h5>
                        <canvas id="tempoChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Avaliações das Receitas</h5>
                        <canvas id="avaliacoesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Seção de Análises -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-4">Análises</h5>
                        <div class="d-flex justify-content-center gap-4">
                            <a href="cadastro.html" class="btn btn-warning">
                                <i class="fas fa-plus-circle me-2"></i>Cadastrar Receita
                            </a>
                            <a href="apresentacao.html" class="btn btn-outline-warning">
                                <i class="fas fa-chart-bar me-2"></i>Ver Análises
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container d-flex justify-content-center align-items-center">
            <p class="mb-0 text-center">&copy; 2024 Recipe Master. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS for Charts -->
    <script src="assets/scripts/apresentacao.js?v=20260302-veg-old1"></script>
    <!-- Custom JS -->
    <script src="assets/scripts/app.js?v=20260302-veg-old1"></script>
    <script src="assets/scripts/auth.js?v=20260302-veg-old1"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const usuario = getUsuarioLogado();
        if (!usuario || !usuario.admin) {
          alert('Acesso restrito! Apenas administradores podem acessar esta página.');
          window.location.href = 'index.html';
        }
      });
    </script>
</body>
</html>
