<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Receitas Favoritas - Recipe Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg">
        <div class="container">
            <a id="nav-logo" class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="/assets/img/chili-pepper-unscreen.gif" alt="Logo">
                <span style="color:#e9a209;">RECIPE MASTER</span>
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-warning">
                    <i class="fas fa-arrow-left me-1"></i>Voltar para Home
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-5">Salvos para a hora da <span style="color: #e9a209;">fome</span></h1>
        <div id="favoritos-container" class="row g-4">
        </div>
        <div id="mensagem-vazio" class="text-center mt-5 d-none">
            <p class="fs-4">Você ainda não tem receitas favoritas.</p>
            <a href="index.html" class="btn btn-warning">Descobrir Receitas</a>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container d-flex justify-content-center align-items-center">
            <p class="mb-0 text-center">&copy; 2024 Recipe Master. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/assets/scripts/app.js"></script> 
    <script src="/assets/scripts/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const favoritosContainer = document.getElementById('favoritos-container');
            const mensagemVazio = document.getElementById('mensagem-vazio');
            const usuarioLogado = getUsuarioLogado(); 

            if (!usuarioLogado || !usuarioLogado.favoritos || usuarioLogado.favoritos.length === 0) {
                mensagemVazio.classList.remove('d-none');
                return;
            }

            const favoritosIds = usuarioLogado.favoritos;
            favoritosContainer.innerHTML = ''; 

            try {
                const response = await fetch('http://localhost:3000/receitas');
                const todasReceitas = await response.json();

                const receitasFavoritas = todasReceitas.filter(receita => favoritosIds.includes(String(receita.id)));

                if (receitasFavoritas.length === 0) {
                    mensagemVazio.classList.remove('d-none');
                    return;
                }

                receitasFavoritas.forEach(receita => {
                    let imagem = (typeof imagensTodasReceitas !== 'undefined' && imagensTodasReceitas[receita.titulo]) ? imagensTodasReceitas[receita.titulo] : (receita.imagem || receita.imagem_principal || '/assets/img/dish.png');
                    const col = document.createElement('div');
                    col.className = 'col-sm-6 col-lg-3';
                    col.innerHTML = `
                        <div class="card dish h-100 position-relative">
                            <div class="dish-heart" style="background-color: var(--primary-color); color: white; width: 70px; height: 70px; right: -10px; top: -10px; border-radius: 0px 37.5px 0px 42.5px; display: flex; align-items: center; justify-content: center; font-size: 1.563rem; z-index: 1;">
                                <i class="fa-solid fa-heart"></i>
                            </div>
                            <div class="text-center">
                                <img src="${imagem}" class="dish-image mx-auto" alt="${receita.titulo || receita.nome}" style="object-fit: contain; height: 200px;">
                            </div>
                            <div class="card-body">
                                <h3 class="dish-title">${receita.titulo || receita.nome}</h3>
                                <p class="dish-description">${receita.descricao || 'Tempo de preparo: ' + receita.tempoPreparo}</p>
                                <div class="dish-rate" style="display: flex; align-items: center;">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <span>(500+)</span>
                                </div>
                            </div>
                            <a href="detalhes.html?id=${receita.id}" class="stretched-link"></a>
                        </div>
                    `;
                    favoritosContainer.appendChild(col);
                });
            } catch (error) {
                console.error('Erro ao carregar receitas favoritas:', error);
                favoritosContainer.innerHTML = '<p class="text-danger text-center">Erro ao carregar suas receitas favoritas. Tente novamente.</p>';
            }
        });
    </script>
</body>
</html>
