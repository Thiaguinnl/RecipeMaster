<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Receitas - Recipe Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg">
        <div class="container">
            <a id="nav-logo" class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="/assets/img/chili-pepper-unscreen.gif" alt="Logo">
                <span style="color:#e9a209;">RECIPE MASTER</span>
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-warning">
                    <i class="fas fa-arrow-left me-1"></i>Voltar para Home
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-5">Cadastro de Receitas</h1>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <form id="form-receita">
                            <input type="hidden" id="id">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome da Receita</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>

                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoria</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="">Selecione uma categoria</option>
                                    <option value="entrada">Entrada</option>
                                    <option value="prato-principal">Prato Principal</option>
                                    <option value="sobremesa">Sobremesa</option>
                                    <option value="bebida">Bebida</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="tempoPreparo" class="form-label">Tempo de Preparo (minutos)</label>
                                <input type="number" class="form-control" id="tempoPreparo" required>
                            </div>

                            <div class="mb-3">
                                <label for="ingredientes" class="form-label">Ingredientes</label>
                                <textarea class="form-control" id="ingredientes" rows="3" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="modoDePreparo" class="form-label">Modo de Preparo</label>
                                <textarea class="form-control" id="modoDePreparo" rows="4" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="imagem" class="form-label">URL da Imagem</label>
                                <input type="url" class="form-control" id="imagem" required>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning">Cadastrar Receita</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Receitas Cadastradas</h2>
                        <ul id="lista-receitas" class="list-group">
                            <!-- As receitas serão carregadas aqui via JavaScript -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container d-flex justify-content-center align-items-center">
            <p class="mb-0 text-center">&copy; 2024 Recipe Master. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/assets/scripts/app.js"></script>
    <script src="/assets/scripts/auth.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const usuario = getUsuarioLogado();
        if (!usuario || !usuario.admin) {
          alert('Acesso restrito! Apenas administradores podem acessar esta página.');
          window.location.href = 'index.html';
        }
      });
    </script>
</body>
</html>
